name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

jobs:
  deploy:
    name: Deploy To Server
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy application with Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch --all
            git checkout main
            git pull origin main
            docker compose --env-file .env up -d --build

      - name: Run remote health checks
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            if [ -f .env ]; then
              set -a
              . ./.env
              set +a
            fi

            BACKEND_PORT="${BACKEND_PORT:-8080}"
            FRONTEND_PORT="${FRONTEND_PORT:-3000}"

            for i in $(seq 1 20); do
              if curl -fsS "http://127.0.0.1:${BACKEND_PORT}/api/health" > /dev/null; then
                echo "Backend healthcheck passed"
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "Backend healthcheck failed"
                exit 1
              fi
              sleep 5
            done

            for i in $(seq 1 20); do
              if curl -fsS "http://127.0.0.1:${FRONTEND_PORT}/" > /dev/null; then
                echo "Frontend healthcheck passed"
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "Frontend healthcheck failed"
                exit 1
              fi
              sleep 5
            done
