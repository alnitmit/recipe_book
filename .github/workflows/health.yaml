name: Health Check

on:
  workflow_call:
    inputs:
      attempts:
        description: Number of retry attempts per service
        required: false
        type: number
        default: 30
      delay_seconds:
        description: Delay between attempts
        required: false
        type: number
        default: 10
  workflow_dispatch:
    inputs:
      attempts:
        description: Number of retry attempts per service
        required: false
        type: number
        default: 30
      delay_seconds:
        description: Delay between attempts
        required: false
        type: number
        default: 10

jobs:
  validate-health-config:
    name: Validate Health Config
    runs-on: ubuntu-latest

    steps:
      - name: Check Render URLs
        env:
          BACKEND_URL: ${{ vars.RENDER_BACKEND_URL }}
          FRONTEND_URL: ${{ vars.RENDER_FRONTEND_URL }}
        run: |
          set -e

          if [ -z "$BACKEND_URL" ]; then
            echo "Missing repository variable RENDER_BACKEND_URL"
            exit 1
          fi

          if [ -z "$FRONTEND_URL" ]; then
            echo "Missing repository variable RENDER_FRONTEND_URL"
            exit 1
          fi

  health-backend:
    name: Backend Health Check
    runs-on: ubuntu-latest
    needs: validate-health-config

    steps:
      - name: Wait for backend health endpoint
        env:
          BACKEND_URL: ${{ vars.RENDER_BACKEND_URL }}
          ATTEMPTS: ${{ inputs.attempts }}
          DELAY_SECONDS: ${{ inputs.delay_seconds }}
        run: |
          set -e

          for i in $(seq 1 "$ATTEMPTS"); do
            if curl --fail --silent --show-error "${BACKEND_URL}/api/health" > /dev/null; then
              echo "Backend healthcheck passed"
              exit 0
            fi

            if [ "$i" -eq "$ATTEMPTS" ]; then
              echo "Backend healthcheck failed"
              exit 1
            fi

            sleep "$DELAY_SECONDS"
          done

  health-frontend:
    name: Frontend Health Check
    runs-on: ubuntu-latest
    needs:
      - validate-health-config
      - health-backend

    steps:
      - name: Wait for frontend root endpoint
        env:
          FRONTEND_URL: ${{ vars.RENDER_FRONTEND_URL }}
          ATTEMPTS: ${{ inputs.attempts }}
          DELAY_SECONDS: ${{ inputs.delay_seconds }}
        run: |
          set -e

          for i in $(seq 1 "$ATTEMPTS"); do
            if curl --fail --silent --show-error "${FRONTEND_URL}/" > /dev/null; then
              echo "Frontend healthcheck passed"
              exit 0
            fi

            if [ "$i" -eq "$ATTEMPTS" ]; then
              echo "Frontend healthcheck failed"
              exit 1
            fi

            sleep "$DELAY_SECONDS"
          done
