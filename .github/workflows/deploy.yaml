name: Deploy

on:
  workflow_call:
    inputs:
      ref:
        description: Commit SHA to deploy on Render
        required: false
        type: string
        default: ""
      deploy_backend:
        description: Trigger backend deploy
        required: false
        type: boolean
        default: true
      deploy_frontend:
        description: Trigger frontend deploy
        required: false
        type: boolean
        default: true
    secrets:
      RENDER_BACKEND_DEPLOY_HOOK_URL:
        required: false
      RENDER_FRONTEND_DEPLOY_HOOK_URL:
        required: false
  workflow_dispatch:
    inputs:
      ref:
        description: Commit SHA to deploy on Render
        required: false
        type: string
        default: ""
      deploy_backend:
        description: Trigger backend deploy
        required: false
        type: boolean
        default: true
      deploy_frontend:
        description: Trigger frontend deploy
        required: false
        type: boolean
        default: true

concurrency:
  group: render-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-config:
    name: Validate Deploy Config
    runs-on: ubuntu-latest

    steps:
      - name: Check Render deploy hooks
        env:
          DEPLOY_BACKEND: ${{ inputs.deploy_backend }}
          DEPLOY_FRONTEND: ${{ inputs.deploy_frontend }}
          BACKEND_HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}
          FRONTEND_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}
        run: |
          set -e

          if [ "$DEPLOY_BACKEND" = "true" ] && [ -z "$BACKEND_HOOK" ]; then
            echo "Missing secret RENDER_BACKEND_DEPLOY_HOOK_URL"
            exit 1
          fi

          if [ "$DEPLOY_FRONTEND" = "true" ] && [ -z "$FRONTEND_HOOK" ]; then
            echo "Missing secret RENDER_FRONTEND_DEPLOY_HOOK_URL"
            exit 1
          fi

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: validate-config
    if: inputs.deploy_backend

    steps:
      - name: Trigger backend deploy hook
        env:
          HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}
          DEPLOY_REF: ${{ inputs.ref }}
        run: |
          set -e

          URL="$HOOK_URL"
          if [ -n "$DEPLOY_REF" ]; then
            case "$URL" in
              *\?*) URL="${URL}&ref=${DEPLOY_REF}" ;;
              *) URL="${URL}?ref=${DEPLOY_REF}" ;;
            esac
          fi

          curl --fail --silent --show-error --request POST "$URL"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: validate-config
    if: inputs.deploy_frontend

    steps:
      - name: Trigger frontend deploy hook
        env:
          HOOK_URL: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}
          DEPLOY_REF: ${{ inputs.ref }}
        run: |
          set -e

          URL="$HOOK_URL"
          if [ -n "$DEPLOY_REF" ]; then
            case "$URL" in
              *\?*) URL="${URL}&ref=${DEPLOY_REF}" ;;
              *) URL="${URL}?ref=${DEPLOY_REF}" ;;
            esac
          fi

          curl --fail --silent --show-error --request POST "$URL"
