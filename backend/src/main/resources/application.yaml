spring:
  application:
    name: recipebook

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_batch_fetch_size: 50
    show-sql: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/recipebook}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}

server:
  port: ${PORT:8080}

springdoc:
  override-with-generic-response: false
